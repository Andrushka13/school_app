{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-success">
            <div class="card-header bg-success text-white text-center">
                <h4>Письмо отправлено</h4>
            </div>
            <div class="card-body text-center">
                <p>Мы отправили вам инструкцию по восстановлению пароля на указанный email, если он существует в нашей базе.</p>
                <p class="text-muted">Вы должны получить письмо в ближайшее время.</p>
                <a href="{% url 'core:login' %}" class="btn btn-primary mt-3">Вернуться ко входу</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
